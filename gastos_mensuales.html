<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos Mensuales</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-sec: #f5f5f4; --bg-ter: #f0efed;
    --text: #1a1a1a; --text-sec: #6b6b6b; --text-ter: #aaaaaa;
    --border: rgba(0,0,0,0.1); --border-med: rgba(0,0,0,0.18);
    --accent: #1a1a1a;
    --info-bg: #e8f1fb; --info-text: #1050a0;
    --warn-bg: #fef3e2; --warn-text: #a06010;
    --success-bg: #eaf6ee; --success-text: #1a7a3a;
    --danger-bg: #fdeaea; --danger-text: #c02020;
    --radius: 8px; --radius-lg: 12px;
    --mono: 'SF Mono','Fira Mono','Consolas',monospace;
    --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg-sec: #2c2c2e; --bg-ter: #3a3a3c;
      --text: #f2f2f7; --text-sec: #aeaeb2; --text-ter: #636366;
      --border: rgba(255,255,255,0.1); --border-med: rgba(255,255,255,0.18);
      --accent: #f2f2f7;
      --info-bg: #0c2a4a; --info-text: #7eb8f7;
      --warn-bg: #3a2800; --warn-text: #f5b84a;
      --success-bg: #0a2a14; --success-text: #4ad678;
      --danger-bg: #2a0a0a; --danger-text: #f07070;
    }
  }
  body { font-family: var(--sans); font-size: 14px; color: var(--text); background: var(--bg-ter); min-height: 100vh; padding: 24px 16px; }
  .container { max-width: 1150px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .topbar-title { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; font-family: var(--sans); transition: background 0.12s, opacity 0.12s; white-space: nowrap; }
  .btn:hover { background: var(--bg-sec); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.85; }
  .btn.success { background: var(--success-bg); color: var(--success-text); border-color: var(--success-text); }
  .btn.success:hover { opacity: 0.85; }
  .btn.danger { color: var(--danger-text); border-color: var(--danger-text); }
  .btn.danger:hover { background: var(--danger-bg); }
  .btn.sm { padding: 5px 9px; font-size: 12px; }
  .btn.icon { padding: 6px 8px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .metric { background: var(--bg); border-radius: var(--radius-lg); padding: 14px 16px; border: 1px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 22px; font-weight: 600; font-family: var(--mono); }
  .metric-value.warn { color: var(--warn-text); }
  .metric-value.info { color: var(--info-text); }
  .metric-value.danger { color: var(--danger-text); }
  .metric-value.success { color: var(--success-text); }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 18px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-sec); transition: color 0.12s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
  .nav-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .nav-center { display: flex; align-items: center; gap: 8px; }
  .nav-center .period { font-size: 15px; font-weight: 500; min-width: 160px; text-align: center; }
  .now-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--info-text); margin-left: 6px; vertical-align: middle; }
  .nav-total { font-size: 13px; color: var(--text-sec); }
  .nav-total strong { font-family: var(--mono); color: var(--text); }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
  th { font-weight: 500; font-size: 11px; color: var(--text-sec); background: var(--bg-sec); text-align: left; white-space: nowrap; position: sticky; top: 0; z-index: 2; }
  th.num { text-align: right; }
  td { text-align: left; }
  td.num { text-align: right; font-family: var(--mono); }
  td.muted { color: var(--text-ter); font-family: var(--mono); text-align: right; }
  td.loan-amt { color: var(--warn-text); font-family: var(--mono); text-align: right; }
  td.fixed-amt { font-family: var(--mono); text-align: right; }
  td.paid-cell { color: var(--success-text); font-family: var(--mono); text-align: right; }
  td.diff-pos { color: var(--success-text); font-family: var(--mono); text-align: right; font-weight: 500; }
  td.diff-neg { color: var(--danger-text); font-family: var(--mono); text-align: right; font-weight: 500; }
  td.diff-zero { color: var(--text-ter); font-family: var(--mono); text-align: right; }
  tr:last-child td { border-bottom: none; }
  tr.cat-row td { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-sec); background: var(--bg-sec); }
  tr.cat-subtotal td { font-weight: 600; font-size: 12px; background: var(--bg-sec); border-top: 1px solid var(--border-med); }
  tr.cat-subtotal td:first-child { padding-left: 24px; font-family: var(--sans); color: var(--text-sec); }
  tr.exp-row td:first-child { padding-left: 24px; color: var(--text-sec); }
  tr.exp-row:hover td { background: var(--bg-sec); }
  tr.total-row td { font-weight: 600; background: var(--bg-sec); font-family: var(--mono); border-top: 2px solid var(--border-med); }
  tr.total-row td:first-child { font-family: var(--sans); font-size: 13px; }
  .row-actions { display: inline-flex; gap: 3px; float: right; opacity: 0; }
  tr:hover .row-actions { opacity: 1; }
  td.month-now { background: var(--info-bg) !important; color: var(--info-text) !important; font-weight: 500; }
  th.month-now { background: var(--info-bg) !important; color: var(--info-text) !important; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: var(--radius); margin-left: 5px; vertical-align: middle; font-weight: 500; }
  .badge.loan { background: var(--warn-bg); color: var(--warn-text); }
  .badge.perm { background: var(--success-bg); color: var(--success-text); }
  .badge.off { background: var(--bg-sec); color: var(--text-ter); }
  .progress-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; min-width: 60px; }
  .progress-fill { height: 100%; background: var(--warn-text); border-radius: 3px; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-ter); font-size: 13px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--bg); border: 1px solid var(--border-med); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 420px; max-height: 92vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 1.1rem; }
  .modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; padding-top: 12px; border-top: 1px solid var(--border); }
  .fg { margin-bottom: 12px; }
  .fg label { display: block; font-size: 12px; color: var(--text-sec); margin-bottom: 4px; font-weight: 500; }
  .fg input, .fg select { width: 100%; padding: 8px 10px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; transition: box-shadow 0.12s; }
  .fg input:focus, .fg select:focus { outline: none; box-shadow: 0 0 0 2px var(--info-text); }
  .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .toggle-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
  .cat-list { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 14px; }
  .cat-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .cat-item:last-child { border-bottom: none; }
  .cat-item-name { flex: 1; font-size: 14px; }
  .cat-item-count { font-size: 12px; color: var(--text-sec); white-space: nowrap; }
  .cat-edit-input { flex: 1; padding: 5px 8px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; }
  .cat-edit-input:focus { outline: none; box-shadow: 0 0 0 2px var(--info-text); }
  /* Payments section */
  .payments-grid { display: flex; flex-direction: column; gap: 12px; }
  .pay-cat-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .pay-cat-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: var(--bg-sec); border-bottom: 1px solid var(--border); }
  .pay-cat-name { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-sec); }
  .pay-cat-summary { font-size: 12px; font-family: var(--mono); display: flex; gap: 14px; }
  .pay-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); }
  .pay-row:last-child { border-bottom: none; }
  .pay-name { flex: 1; font-size: 13px; color: var(--text-sec); }
  .pay-budgeted { font-family: var(--mono); font-size: 13px; min-width: 80px; text-align: right; color: var(--text-sec); }
  .pay-input-wrap { display: flex; align-items: center; gap: 6px; }
  .pay-input { width: 110px; padding: 5px 8px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; text-align: right; }
  .pay-input:focus { outline: none; box-shadow: 0 0 0 2px var(--info-text); }
  .pay-diff { min-width: 80px; text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .pay-diff.pos { color: var(--success-text); }
  .pay-diff.neg { color: var(--danger-text); }
  .pay-diff.zero { color: var(--text-ter); }
  .pay-cat-footer { display: flex; justify-content: flex-end; gap: 18px; padding: 8px 14px; background: var(--bg-sec); border-top: 1px solid var(--border); font-size: 12px; }
  .pay-footer-item { display: flex; gap: 6px; align-items: center; }
  .pay-footer-label { color: var(--text-sec); }
  .pay-footer-val { font-family: var(--mono); font-weight: 600; }
  .pay-footer-val.pos { color: var(--success-text); }
  .pay-footer-val.neg { color: var(--danger-text); }
  .pay-total-bar { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .pay-total-item { display: flex; flex-direction: column; gap: 2px; }
  .pay-total-label { font-size: 11px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.04em; }
  .pay-total-val { font-size: 18px; font-weight: 600; font-family: var(--mono); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 3px; }
  .sync-bar { display:flex; align-items:center; gap:10px; padding:8px 14px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); font-size:12px; flex-wrap:wrap; }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--text-ter); flex-shrink:0; }
  .sync-dot.ok { background:var(--success-text); }
  .sync-dot.busy { background:var(--warn-text); animation:pulse 1s infinite; }
  .sync-dot.err { background:var(--danger-text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-status { color:var(--text-sec); flex:1; }
  .sync-time { color:var(--text-ter); font-family:var(--mono); }
  /* Lock screen */
  #lock-screen { position:fixed; inset:0; background:var(--bg-ter); display:flex; align-items:center; justify-content:center; z-index:999; padding:1rem; }
  .lock-card { background:var(--bg); border:1px solid var(--border-med); border-radius:var(--radius-lg); padding:2rem; width:100%; max-width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.12); text-align:center; }
  .lock-icon { font-size:36px; margin-bottom:12px; }
  .lock-card h2 { font-size:18px; font-weight:600; margin-bottom:4px; }
  .lock-card p { font-size:13px; color:var(--text-sec); margin-bottom:20px; }
  .lock-input { width:100%; padding:10px 12px; border:1px solid var(--border-med); border-radius:var(--radius); background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px; text-align:center; letter-spacing:0.1em; margin-bottom:10px; }
  .lock-input:focus { outline:none; box-shadow:0 0 0 2px var(--info-text); }
  .lock-error { font-size:12px; color:var(--danger-text); min-height:18px; margin-bottom:10px; }
  .lock-hint { font-size:11px; color:var(--text-ter); margin-top:12px; }
</style>
</head>
<body>
<div id="lock-screen" style="display:none">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <h2>Gastos Mensuales</h2>
    <p id="lock-label">Ingresa tu contraseña para continuar</p>
    <input type="password" class="lock-input" id="lock-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlockApp()">
    <div class="lock-error" id="lock-error"></div>
    <button class="btn primary" style="width:100%" onclick="unlockApp()">Entrar</button>
    <div class="lock-hint" id="lock-hint"></div>
  </div>
</div>
<div class="container" id="app"></div>
<script>
const MES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MES_F = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const now = new Date();

let S = {
  categories: [], expenses: [],
  payments: {},   // key: "YYYY-MM-catId" => { expId: amount }
  year: now.getFullYear(), month: now.getMonth(),
  tab: 'month', modal: null, editId: null, editCatId: null, modal_data: {}
};

// ── PASSWORD PROTECTION ──
let APP_UNLOCKED = false;

function hashPassword(pw) {
  // Simple deterministic hash (SHA-256 not available without crypto.subtle async,
  // so we use a quick djb2-style hash stored as hex — good enough for local protection)
  let h = 5381;
  for (let i = 0; i < pw.length; i++) h = ((h << 5) + h) ^ pw.charCodeAt(i);
  return (h >>> 0).toString(16).padStart(8, '0');
}

// Password hash is stored both in localStorage (for this machine) AND in the Gist
// so that any machine with the Gist configured gets the same password requirement.
let REMOTE_PW_HASH = ''; // populated after gistPull

function getPasswordHash() {
  return REMOTE_PW_HASH || localStorage.getItem('gastos_pw_hash') || '';
}

function isPasswordSet() {
  return !!getPasswordHash();
}

function unlockApp() {
  const input = document.getElementById('lock-input');
  const errEl = document.getElementById('lock-error');
  if (!input) return;
  const pw = input.value;
  if (!pw) { errEl.textContent = 'Ingresa tu contraseña.'; return; }
  if (hashPassword(pw) === getPasswordHash()) {
    APP_UNLOCKED = true;
    document.getElementById('lock-screen').style.display = 'none';
    input.value = '';
    errEl.textContent = '';
    // Now do the normal init
    initApp();
  } else {
    errEl.textContent = 'Contraseña incorrecta. Intenta de nuevo.';
    input.value = '';
    input.focus();
  }
}

function showLockScreen() {
  const ls = document.getElementById('lock-screen');
  if (!ls) return;
  ls.style.display = 'flex';
  setTimeout(() => { const inp = document.getElementById('lock-input'); if(inp) inp.focus(); }, 100);
}

function openPasswordModal() {
  S.modal = 'password'; render(); renderPasswordModal();
}

function renderPasswordModal() {
  const hasPassword = isPasswordSet();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal" style="max-width:360px">
    <h2>🔒 Contraseña de acceso</h2>
    ${hasPassword ? `
    <p style="font-size:13px;color:var(--text-sec);margin-bottom:14px">Cambia o elimina la contraseña de acceso.</p>
    <div class="fg"><label>Contraseña actual</label><input type="password" id="pw-current" placeholder="••••••••"></div>
    <div class="fg"><label>Nueva contraseña (dejar vacío para eliminarla)</label><input type="password" id="pw-new" placeholder="••••••••"></div>
    <div class="fg"><label>Confirmar nueva contraseña</label><input type="password" id="pw-confirm" placeholder="••••••••"></div>
    ` : `
    <p style="font-size:13px;color:var(--text-sec);margin-bottom:14px">Configura una contraseña para proteger el acceso a la app.</p>
    <div class="fg"><label>Nueva contraseña</label><input type="password" id="pw-new" placeholder="••••••••"></div>
    <div class="fg"><label>Confirmar contraseña</label><input type="password" id="pw-confirm" placeholder="••••••••"></div>
    `}
    <div id="pw-msg" style="font-size:12px;min-height:18px;margin-bottom:4px"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="savePassword(${hasPassword})">${hasPassword ? 'Actualizar' : 'Establecer contraseña'}</button>
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
  setTimeout(() => { const f = document.getElementById('pw-current') || document.getElementById('pw-new'); if(f) f.focus(); }, 50);
}

function savePassword(hasExisting) {
  const msg = document.getElementById('pw-msg');
  const newPw = (document.getElementById('pw-new')?.value || '');
  const confirm = (document.getElementById('pw-confirm')?.value || '');

  if (hasExisting) {
    const current = (document.getElementById('pw-current')?.value || '');
    if (hashPassword(current) !== getPasswordHash()) {
      msg.innerHTML = '<span style="color:var(--danger-text)">La contraseña actual es incorrecta.</span>'; return;
    }
    if (!newPw) {
      // Remove password
      localStorage.removeItem('gastos_pw_hash');
      REMOTE_PW_HASH = '';
      if (GIST_CFG.token && GIST_CFG.gistId) gistPush();
      msg.innerHTML = '<span style="color:var(--success-text)">✓ Contraseña eliminada y sincronizada.</span>';
      setTimeout(() => closeModal(), 1000); return;
    }
  }

  if (!newPw) { msg.innerHTML = '<span style="color:var(--danger-text)">Ingresa una contraseña.</span>'; return; }
  if (newPw !== confirm) { msg.innerHTML = '<span style="color:var(--danger-text)">Las contraseñas no coinciden.</span>'; return; }
  if (newPw.length < 4) { msg.innerHTML = '<span style="color:var(--danger-text)">Mínimo 4 caracteres.</span>'; return; }

  const hash = hashPassword(newPw);
  localStorage.setItem('gastos_pw_hash', hash);
  REMOTE_PW_HASH = hash;
  // Push the new hash to Gist immediately so other machines get it
  if (GIST_CFG.token && GIST_CFG.gistId) gistPush();
  msg.innerHTML = '<span style="color:var(--success-text)">✓ Contraseña guardada y sincronizada.</span>';
  setTimeout(() => closeModal(), 1000);
}

// ── GITHUB GIST SYNC ──
let GIST_CFG = { token: '', gistId: '' };
let syncTimer = null;

function loadGistCfg() {
  try { const d = localStorage.getItem('gastos_gist_cfg'); if (d) GIST_CFG = {...GIST_CFG, ...JSON.parse(d)}; } catch(e) {}
}
function saveGistCfg() {
  try { localStorage.setItem('gastos_gist_cfg', JSON.stringify(GIST_CFG)); } catch(e) {}
}

function setSyncStatus(state, msg, time) {
  const dot = document.getElementById('sync-dot');
  const status = document.getElementById('sync-status');
  const timeEl = document.getElementById('sync-time');
  if (!dot) return;
  dot.className = 'sync-dot ' + (state || '');
  if (status) status.textContent = msg || '';
  if (timeEl) timeEl.textContent = time ? 'Última sync: ' + time : '';
}

async function gistPush() {
  if (!GIST_CFG.token || !GIST_CFG.gistId) return;
  setSyncStatus('busy', 'Guardando en la nube...');
  const data = dataToSync();
  try {
    const res = await fetch('https://api.github.com/gists/' + GIST_CFG.gistId, {
      method: 'PATCH',
      headers: { 'Authorization': 'token ' + GIST_CFG.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { 'gastos_data.json': { content: JSON.stringify(data) } } })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const t = new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('gastos_last_sync', t);
    setSyncStatus('ok', 'Sincronizado', t);
  } catch(e) {
    setSyncStatus('err', 'Error al guardar: ' + e.message);
  }
}

async function gistPull() {
  if (!GIST_CFG.token || !GIST_CFG.gistId) return false;
  setSyncStatus('busy', 'Cargando de la nube...');
  try {
    const res = await fetch('https://api.github.com/gists/' + GIST_CFG.gistId, {
      headers: { 'Authorization': 'token ' + GIST_CFG.token }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const gist = await res.json();
    const file = gist.files['gastos_data.json'];
    if (!file) { setSyncStatus('err', 'No se encontró gastos_data.json en el Gist'); return false; }
    const remote = JSON.parse(file.content);
    applySync(remote);
    save();
    const t = new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('gastos_last_sync', t);
    setSyncStatus('ok', 'Datos cargados', t);
    render();
    return true;
  } catch(e) {
    setSyncStatus('err', 'Error al cargar: ' + e.message);
    return false;
  }
}

async function createGist() {
  if (!GIST_CFG.token) return null;
  try {
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { 'Authorization': 'token ' + GIST_CFG.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        description: 'Gastos Mensuales - datos',
        public: false,
        files: { 'gastos_data.json': { content: JSON.stringify(dataToSync()) } }
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const gist = await res.json();
    return gist.id;
  } catch(e) { return null; }
}

function dataToSync() {
  return {
    categories: S.categories,
    expenses: S.expenses,
    payments: S.payments,
    pwHash: getPasswordHash() || undefined  // include password hash in Gist
  };
}

function applySync(remote) {
  if (remote.categories) S.categories = remote.categories;
  if (remote.expenses) S.expenses = remote.expenses;
  if (remote.payments) S.payments = remote.payments;
  if (remote.pwHash) {
    REMOTE_PW_HASH = remote.pwHash;
    localStorage.setItem('gastos_pw_hash', remote.pwHash); // cache locally too
  } else {
    REMOTE_PW_HASH = '';
  }
}

function schedulePush() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(gistPush, 1500);
}

function load() {
  loadGistCfg();
  try {
    const d = localStorage.getItem('gastos_html_v2') || localStorage.getItem('gastos_html_v1');
    if (d) {
      S = {...S, ...JSON.parse(d)};
      if (!S.payments) S.payments = {};
      localStorage.setItem('gastos_html_v2', JSON.stringify(S));
    }
  } catch(e) {}
}

function save() {
  try { localStorage.setItem('gastos_html_v2', JSON.stringify(S)); } catch(e) {}
  if (GIST_CFG.token && GIST_CFG.gistId) schedulePush();
}

function amt(exp, y, m) {
  if (!exp.active) return 0;
  const s = new Date(exp.startYear, exp.startMonth, 1), c = new Date(y, m, 1);
  if (c < s) return 0;
  if (!exp.permanent) { const e = new Date(exp.startYear, exp.startMonth + exp.months, 1); if (c >= e) return 0; }
  return exp.amount;
}
function monthTotal(y, m) { return S.expenses.reduce((t, e) => t + amt(e, y, m), 0); }
function catMonthTotal(catId, y, m) { return S.expenses.filter(e => e.categoryId === catId).reduce((t, e) => t + amt(e, y, m), 0); }

function payKey(y, m, catId) { return `${y}-${m}-${catId}`; }
function getPaid(y, m, expId, catId) {
  const k = payKey(y, m, catId);
  return (S.payments[k] && S.payments[k][expId] != null) ? S.payments[k][expId] : null;
}
function setPaid(y, m, expId, catId, val) {
  const k = payKey(y, m, catId);
  if (!S.payments[k]) S.payments[k] = {};
  if (val === null || val === '') delete S.payments[k][expId];
  else S.payments[k][expId] = parseFloat(val) || 0;
  save();
}
function catPaidTotal(catId, y, m) {
  const k = payKey(y, m, catId);
  if (!S.payments[k]) return 0;
  return Object.values(S.payments[k]).reduce((t, v) => t + (v || 0), 0);
}
function monthPaidTotal(y, m) { return S.categories.reduce((t, c) => t + catPaidTotal(c.id, y, m), 0); }

function loanRemaining(exp) {
  const curDate = new Date(now.getFullYear(), now.getMonth(), 1); let rem = 0;
  for (let i = 0; i < exp.months; i++) { const d = new Date(exp.startYear, exp.startMonth + i, 1); if (d >= curDate) rem += exp.amount; }
  return rem;
}
function loanPaid(exp) { return exp.amount * exp.months - loanRemaining(exp); }
function totalLoanRemaining() { return S.expenses.filter(e => !e.permanent && e.active).reduce((t, e) => t + loanRemaining(e), 0); }

function fmt(n) { if (n === 0) return '—'; return '$' + Math.round(Math.abs(n)).toLocaleString('es-MX'); }
function fmtS(n) { return '$' + Math.round(n).toLocaleString('es-MX'); }
function fmtDiff(diff) {
  if (diff === 0) return { txt: '—', cls: 'zero' };
  const sign = diff > 0 ? '+' : '-';
  return { txt: sign + '$' + Math.round(Math.abs(diff)).toLocaleString('es-MX'), cls: diff > 0 ? 'pos' : 'neg' };
}

function renderMonthTable(y, m) {
  if (!S.categories.length) return emptyState('Sin gastos. Agrega el primero con el botón de arriba.');
  let rows = '', hasRows = false;
  S.categories.forEach(cat => {
    // Hide loans that fully ended before this month; keep permanent and upcoming
    const exps = S.expenses.filter(e => {
      if (e.categoryId !== cat.id) return false;
      if (e.permanent) return true;
      return new Date(y, m, 1) < new Date(e.startYear, e.startMonth + e.months, 1);
    });
    if (!exps.length) return;
    hasRows = true;
    const catBudget = catMonthTotal(cat.id, y, m);
    const catPaid = catPaidTotal(cat.id, y, m);
    const catDiff = catPaid - catBudget;
    rows += `<tr class="cat-row"><td colspan="5">${cat.name}</td></tr>`;
    exps.forEach(exp => {
      const v = amt(exp, y, m);
      const paid = getPaid(y, m, exp.id, cat.id);
      const badge = exp.permanent ? '<span class="badge perm">fijo</span>' : '<span class="badge loan">préstamo</span>';
      const offBadge = !v ? '<span class="badge off">inactivo</span>' : '';
      const endM = (exp.startMonth + exp.months - 1) % 12;
      const endY = exp.startYear + Math.floor((exp.startMonth + exp.months - 1) / 12);
      const durText = exp.permanent ? 'Permanente' : `${exp.months}m · fin ${MES[endM]} ${endY}`;
      const paidTxt = paid !== null ? '<span style="color:var(--success-text);font-family:var(--mono)">$' + Math.round(paid).toLocaleString('es-MX') + '</span>' : '<span style="color:var(--text-ter)">—</span>';
      rows += `<tr class="exp-row">
        <td>${exp.name}${badge}${offBadge}
          <span class="row-actions">
            <button class="btn sm icon" onclick="openEdit('${exp.id}')" title="Editar">&#9998;</button>
            <button class="btn sm icon danger" onclick="delExp('${exp.id}')" title="Eliminar">&#10005;</button>
          </span>
        </td>
        <td class="${v>0?(exp.permanent?'fixed-amt':'loan-amt'):'muted'}">${fmt(v)}</td>
        <td class="paid-cell">${paidTxt}</td>
        <td style="color:var(--text-sec);font-size:12px">${durText}</td>
        <td style="color:var(--text-sec);font-size:12px;text-align:right">${MES[exp.startMonth]} ${exp.startYear}</td>
      </tr>`;
    });
    // Subtotal row per category
    const d = fmtDiff(catDiff);
    rows += `<tr class="cat-subtotal">
      <td>Subtotal ${cat.name}</td>
      <td class="num">${fmtS(catBudget)}</td>
      <td class="num" style="color:var(--success-text)">${catPaid > 0 ? fmtS(catPaid) : '—'}</td>
      <td class="${'diff-'+d.cls}" colspan="2">${catPaid > 0 ? d.txt : '—'}</td>
    </tr>`;
  });
  if (!hasRows) return emptyState('Sin gastos registrados.');
  const totalBudget = monthTotal(y, m), totalPaid = monthPaidTotal(y, m);
  const td = fmtDiff(totalPaid - totalBudget);
  rows += `<tr class="total-row">
    <td>Total del mes</td>
    <td class="num">${fmtS(totalBudget)}</td>
    <td class="num" style="color:var(--success-text)">${totalPaid > 0 ? fmtS(totalPaid) : '—'}</td>
    <td class="${'diff-'+td.cls}" colspan="2">${totalPaid > 0 ? td.txt : '—'}</td>
  </tr>`;
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>Gasto</th>
      <th class="num">Presupuesto</th>
      <th class="num">Pagado</th>
      <th>Duración</th>
      <th class="num">Inicio</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderPayments(y, m) {
  if (!S.categories.length) return emptyState('Sin categorías. Agrega gastos primero.');
  const totalBudget = monthTotal(y, m);
  const totalPaid = monthPaidTotal(y, m);
  const totalDiff = fmtDiff(totalPaid - totalBudget);

  let cards = '';
  S.categories.forEach(cat => {
    const exps = S.expenses.filter(e => e.categoryId === cat.id && amt(e, y, m) > 0);
    if (!exps.length) return;
    const catBudget = catMonthTotal(cat.id, y, m);
    const catPaid = catPaidTotal(cat.id, y, m);
    const catDiff = fmtDiff(catPaid - catBudget);
    let payRows = '';
    exps.forEach(exp => {
      const v = amt(exp, y, m);
      const paid = getPaid(y, m, exp.id, cat.id);
      const diff = paid !== null ? fmtDiff(paid - v) : null;
      payRows += `<div class="pay-row">
        <span class="pay-name">${exp.name}</span>
        <span class="pay-budgeted">${fmtS(v)}</span>
        <div class="pay-input-wrap">
          <span style="font-size:12px;color:var(--text-ter)">$</span>
          <input class="pay-input" type="number" min="0" placeholder="0"
            value="${paid !== null ? paid : ''}"
            onchange="setPaid(${y},${m},'${exp.id}','${cat.id}',this.value);renderPaymentsOnly(${y},${m})"
            oninput="livePayDiff(this,${v},'diff_${exp.id}')"
            id="pinput_${exp.id}">
        </div>
        <span class="pay-diff ${diff?diff.cls:'zero'}" id="diff_${exp.id}">${diff ? diff.txt : '—'}</span>
      </div>`;
    });
    cards += `<div class="pay-cat-card">
      <div class="pay-cat-head">
        <span class="pay-cat-name">${cat.name}</span>
        <span class="pay-cat-summary">
          <span style="color:var(--text-sec)">Pres: <strong>${fmtS(catBudget)}</strong></span>
          <span style="color:var(--success-text)">Pag: <strong>${catPaid>0?fmtS(catPaid):'—'}</strong></span>
        </span>
      </div>
      ${payRows}
      <div class="pay-cat-footer">
        <div class="pay-footer-item"><span class="pay-footer-label">Subtotal pagado:</span><span class="pay-footer-val" style="color:var(--success-text)">${catPaid>0?fmtS(catPaid):'—'}</span></div>
        <div class="pay-footer-item"><span class="pay-footer-label">Diferencia:</span><span class="pay-footer-val ${catDiff.cls}">${catPaid>0?catDiff.txt:'—'}</span></div>
      </div>
    </div>`;
  });

  return `<div class="pay-total-bar">
    <div class="pay-total-item"><div class="pay-total-label">Presupuesto total</div><div class="pay-total-val">${fmtS(totalBudget)}</div></div>
    <div class="pay-total-item"><div class="pay-total-label">Total pagado</div><div class="pay-total-val" style="color:var(--success-text)">${totalPaid>0?fmtS(totalPaid):'—'}</div></div>
    <div class="pay-total-item"><div class="pay-total-label">Por pagar</div><div class="pay-total-val" style="color:var(--warn-text)">${fmtS(Math.max(0,totalBudget-totalPaid))}</div></div>
    <div class="pay-total-item"><div class="pay-total-label">Diferencia</div><div class="pay-total-val ${totalDiff.cls}">${totalPaid>0?totalDiff.txt:'—'}</div></div>
  </div>
  <div class="payments-grid" id="pay-grid">${cards}</div>`;
}

function renderPaymentsOnly(y, m) {
  // Re-render just the totals without losing focus
  const bar = document.querySelector('.pay-total-bar');
  if (!bar) return;
  const totalBudget = monthTotal(y, m);
  const totalPaid = monthPaidTotal(y, m);
  const totalDiff = fmtDiff(totalPaid - totalBudget);
  bar.querySelectorAll('.pay-total-val')[0].textContent = fmtS(totalBudget);
  bar.querySelectorAll('.pay-total-val')[1].textContent = totalPaid > 0 ? fmtS(totalPaid) : '—';
  bar.querySelectorAll('.pay-total-val')[2].textContent = fmtS(Math.max(0, totalBudget - totalPaid));
  const diffEl = bar.querySelectorAll('.pay-total-val')[3];
  diffEl.textContent = totalPaid > 0 ? totalDiff.txt : '—';
  diffEl.className = 'pay-total-val ' + totalDiff.cls;
  // Update category footers
  S.categories.forEach(cat => {
    const catPaid = catPaidTotal(cat.id, y, m);
    const catBudget = catMonthTotal(cat.id, y, m);
    const catDiff = fmtDiff(catPaid - catBudget);
    const card = document.querySelector(`[data-catfoot="${cat.id}"]`);
    if (card) {
      card.querySelectorAll('.pay-footer-val')[0].textContent = catPaid > 0 ? fmtS(catPaid) : '—';
      const de = card.querySelectorAll('.pay-footer-val')[1];
      de.textContent = catPaid > 0 ? catDiff.txt : '—';
      de.className = 'pay-footer-val ' + catDiff.cls;
      const sumEl = card.closest('.pay-cat-card').querySelector('.pay-cat-summary strong:last-child');
    }
  });
  // Also update metrics
  const remaining = totalBudget - totalPaid;
  const mets = document.querySelectorAll('.metric-value');
  if (mets.length >= 3) {
    mets[1].textContent = fmtS(totalPaid);
    mets[2].textContent = fmtS(remaining);
    mets[2].className = 'metric-value ' + (remaining > 0 ? 'warn' : '');
  }
}

function livePayDiff(input, budgeted, diffId) {
  const val = parseFloat(input.value) || 0;
  const diff = fmtDiff(val - budgeted);
  const el = document.getElementById(diffId);
  if (el) { el.textContent = val > 0 ? diff.txt : '—'; el.className = 'pay-diff ' + (val > 0 ? diff.cls : 'zero'); }
}

async function connectGist() {
  const token = (document.getElementById('scfg-token')?.value || '').trim();
  const gistId = (document.getElementById('scfg-gistid')?.value || '').trim();
  const msg = document.getElementById('scfg-msg');
  if (!token) { if(msg) msg.innerHTML = '<span style="color:var(--danger-text)">El token es obligatorio.</span>'; return; }
  if(msg) msg.innerHTML = '<span style="color:var(--warn-text)">Verificando...</span>';
  GIST_CFG.token = token;
  if (gistId) {
    GIST_CFG.gistId = gistId;
    saveGistCfg();
    const ok = await gistPull();
    if (ok) { if(msg) msg.innerHTML = '<span style="color:var(--success-text)">✓ Conectado y datos cargados.</span>'; setTimeout(()=>closeModal(), 1200); }
    else { if(msg) msg.innerHTML = '<span style="color:var(--danger-text)">No se pudo conectar. Verifica el token y el Gist ID.</span>'; }
  } else {
    if(msg) msg.innerHTML = '<span style="color:var(--warn-text)">Creando Gist nuevo...</span>';
    const newId = await createGist();
    if (newId) {
      GIST_CFG.gistId = newId;
      saveGistCfg();
      if(msg) msg.innerHTML = '<span style="color:var(--success-text)">✓ Gist creado: ' + newId + '</span>';
      setTimeout(()=>closeModal(), 1500);
    } else {
      if(msg) msg.innerHTML = '<span style="color:var(--danger-text)">Error al crear el Gist. Verifica tu token.</span>';
    }
  }
}

function disconnectGist() {
  if (!confirm('¿Desconectar GitHub Gist? Los datos locales se conservan.')) return;
  GIST_CFG = { token: '', gistId: '' };
  saveGistCfg();
  localStorage.removeItem('gastos_last_sync');
  closeModal();
}

function csvEscape(val) {
  const s = String(val ?? '');
  return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportCSV(type) {
  let rows = [], filename = '';

  if (type === 'gastos') {
    filename = 'gastos_mensuales.csv';
    rows.push(['ID','Nombre','Monto','Categoría','Tipo','Permanente','Meses','Mes inicio','Año inicio','Activo']);
    S.expenses.forEach(exp => {
      const cat = S.categories.find(c => c.id === exp.categoryId);
      rows.push([
        exp.id, exp.name, exp.amount,
        cat ? cat.name : exp.categoryId,
        exp.permanent ? 'Fijo' : 'Préstamo',
        exp.permanent ? 'Sí' : 'No',
        exp.permanent ? '' : exp.months,
        MES_F[exp.startMonth], exp.startYear,
        exp.active ? 'Sí' : 'No'
      ]);
    });
  } else if (type === 'pagos') {
    filename = 'pagos_realizados.csv';
    rows.push(['Año','Mes','Categoría','Gasto','Presupuestado','Pagado','Diferencia']);
    Object.keys(S.payments).sort().forEach(key => {
      const [y, m, ...catParts] = key.split('-');
      const catId = catParts.join('-');
      const cat = S.categories.find(c => c.id === catId);
      const payMap = S.payments[key];
      Object.keys(payMap).forEach(expId => {
        const exp = S.expenses.find(e => e.id === expId);
        const paid = payMap[expId];
        const budgeted = exp ? amt(exp, parseInt(y), parseInt(m)) : 0;
        rows.push([
          y, MES_F[parseInt(m)],
          cat ? cat.name : catId,
          exp ? exp.name : expId,
          budgeted, paid,
          paid - budgeted
        ]);
      });
    });
  } else if (type === 'resumen') {
    filename = 'resumen_mensual.csv';
    const years = [...new Set(S.expenses.map(e => e.startYear))].sort();
    const minY = years[0] || now.getFullYear();
    const maxY = (years[years.length-1] || now.getFullYear()) + 2;
    rows.push(['Año','Mes','Categoría','Presupuestado','Pagado','Diferencia']);
    for (let y = minY; y <= maxY; y++) {
      for (let m = 0; m < 12; m++) {
        S.categories.forEach(cat => {
          const budget = catMonthTotal(cat.id, y, m);
          if (budget === 0) return;
          const paid = catPaidTotal(cat.id, y, m);
          rows.push([y, MES_F[m], cat.name, budget, paid, paid - budget]);
        });
      }
    }
  }

  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('import-status');
  const preview = document.getElementById('import-preview');
  status.textContent = 'Leyendo archivo...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result.replace(/^\uFEFF/, '');
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) { status.textContent = '⚠️ Archivo vacío'; return; }
      const headers = parseCSVLine(lines[0]);

      // Detect type by headers
      const isGastos = headers.includes('Monto') && headers.includes('Permanente');
      const isPagos  = headers.includes('Pagado') && headers.includes('Presupuestado') && headers.includes('Gasto');

      if (!isGastos && !isPagos) {
        status.textContent = '⚠️ Formato no reconocido. Usa un CSV exportado desde esta app.';
        return;
      }

      if (isGastos) {
        // Build category map by name
        const catMap = {};
        S.categories.forEach(c => { catMap[c.name] = c.id; });
        let added = 0, updated = 0;
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);
          if (cols.length < 9) continue;
          const [id, name, amount, catName, , permanent, months, mesInicio, yearStr] = cols;
          if (!name || isNaN(parseFloat(amount))) continue;
          // Ensure category exists
          if (!catMap[catName]) {
            const newCatId = 'cat_' + Date.now() + '_' + i;
            S.categories.push({ id: newCatId, name: catName });
            catMap[catName] = newCatId;
          }
          const startMonth = MES_F.indexOf(mesInicio);
          const exp = {
            id: id || 'exp_' + Date.now() + '_' + i,
            name: name.trim(),
            amount: parseFloat(amount),
            categoryId: catMap[catName],
            permanent: permanent === 'Sí',
            months: parseInt(months) || 12,
            startYear: parseInt(yearStr),
            startMonth: startMonth >= 0 ? startMonth : 0,
            active: true
          };
          const existing = S.expenses.findIndex(e => e.id === exp.id);
          if (existing >= 0) { S.expenses[existing] = exp; updated++; }
          else { S.expenses.push(exp); added++; }
        }
        save(); render();
        status.innerHTML = `<span style="color:var(--success-text)">✓ ${added} gastos agregados, ${updated} actualizados.</span>`;
      } else if (isPagos) {
        let count = 0;
        const catNameToId = {};
        S.categories.forEach(c => { catNameToId[c.name] = c.id; });
        const expNameToId = {};
        S.expenses.forEach(e => { expNameToId[e.name] = e.id; });
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);
          if (cols.length < 6) continue;
          const [yearStr, mesNombre, catName, expName, , paidStr] = cols;
          const y = parseInt(yearStr), m = MES_F.indexOf(mesNombre);
          const catId = catNameToId[catName], expId = expNameToId[expName];
          if (!catId || !expId || isNaN(y) || m < 0) continue;
          setPaid(y, m, expId, catId, parseFloat(paidStr) || 0);
          count++;
        }
        save(); render();
        status.innerHTML = `<span style="color:var(--success-text)">✓ ${count} pagos importados.</span>`;
      }
    } catch(err) {
      status.textContent = '⚠️ Error al leer el archivo: ' + err.message;
    }
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSVLine(line) {
  const result = [], re = /("(?:[^"]|"")*"|[^,]*)/g;
  let m;
  while ((m = re.exec(line)) !== null) {
    if (m.index === re.lastIndex) { re.lastIndex++; continue; }
    let val = m[1];
    if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1,-1).replace(/""/g,'"');
    result.push(val);
  }
  return result;
}

function saveExp() {
  const name=(document.getElementById('mn')?.value||'').trim();
  const amount=parseFloat(document.getElementById('ma')?.value||0);
  const catSel=document.getElementById('mc')?.value;
  const permanent=document.getElementById('mp')?.checked;
  const months=parseInt(document.getElementById('mm')?.value||12);
  const startMonth=parseInt(document.getElementById('msm')?.value);
  const startYear=parseInt(document.getElementById('msy')?.value);
  const newCatName=(document.getElementById('mnc')?.value||'').trim();
  if(!name)return alert('El nombre es requerido');
  if(isNaN(amount)||amount<=0)return alert('Ingresa un monto válido mayor a 0');
  let catId=catSel;
  if(catSel==='__new__'){if(!newCatName)return alert('Escribe el nombre de la nueva categoría');catId='cat_'+Date.now();S.categories.push({id:catId,name:newCatName});}
  if(!catId&&S.categories.length)catId=S.categories[0].id;
  if(!catId){catId='cat_gen';S.categories.push({id:catId,name:'General'});}
  const exp={id:S.editId||'exp_'+Date.now(),name,amount,categoryId:catId,permanent,months,startYear,startMonth,active:true};
  if(S.editId)S.expenses=S.expenses.map(e=>e.id===S.editId?exp:e);else S.expenses.push(exp);
  save();closeModal();
}
function delExp(id){if(!confirm('¿Eliminar este gasto permanentemente?'))return;S.expenses=S.expenses.filter(e=>e.id!==id);save();render();}
function setTab(t){S.tab=t;render();}
function prevPeriod(){if(S.tab==='year'){S.year--;render();return;}if(S.month===0){S.month=11;S.year--;}else S.month--;render();}
function nextPeriod(){if(S.tab==='year'){S.year++;render();return;}if(S.month===11){S.month=0;S.year++;}else S.month++;render();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.modal)closeModal();});

// Startup: if Gist is configured, pull first to get the latest password hash,
// then decide whether to show the lock screen. This ensures the password set
// on one machine is enforced on all others.
async function startup() {
  loadGistCfg();
  if (GIST_CFG.token && GIST_CFG.gistId) {
    // Pull silently to get pwHash before showing anything
    try {
      const res = await fetch('https://api.github.com/gists/' + GIST_CFG.gistId, {
        headers: { 'Authorization': 'token ' + GIST_CFG.token }
      });
      if (res.ok) {
        const gist = await res.json();
        const file = gist.files['gastos_data.json'];
        if (file) {
          const remote = JSON.parse(file.content);
          applySync(remote);
          // Also persist data locally
          try { localStorage.setItem('gastos_html_v2', JSON.stringify({
            categories: S.categories, expenses: S.expenses, payments: S.payments
          })); } catch(e) {}
          const t = new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
          localStorage.setItem('gastos_last_sync', t);
        }
      }
    } catch(e) { /* fall through to local data */ }
  }

  if (isPasswordSet()) {
    showLockScreen();
    // unlockApp() will call initApp() after correct password
  } else {
    APP_UNLOCKED = true;
    initApp();
  }
}

// initApp no longer needs to pull (startup already did it for Gist machines)
const _origInitApp = initApp;
function initApp() {
  load(); // load local state (Gist data already applied by startup if available)
  if(S.categories.length===0){
    S.categories=[{id:'c1',name:'Vivienda'},{id:'c2',name:'Servicios'},{id:'c3',name:'Préstamos'},{id:'c4',name:'Suscripciones'}];
    S.expenses=[
      {id:'e1',name:'Renta',amount:8000,categoryId:'c1',permanent:true,months:12,startYear:2025,startMonth:0,active:true},
      {id:'e2',name:'Préstamo auto',amount:3500,categoryId:'c3',permanent:false,months:18,startYear:2024,startMonth:6,active:true},
      {id:'e3',name:'Netflix',amount:229,categoryId:'c4',permanent:true,months:12,startYear:2024,startMonth:0,active:true},
      {id:'e4',name:'Luz + internet',amount:750,categoryId:'c2',permanent:true,months:12,startYear:2025,startMonth:0,active:true},
    ];
    save();
  }
  render();
  // Background sync status update
  if (GIST_CFG.token && GIST_CFG.gistId) {
    const t = localStorage.getItem('gastos_last_sync');
    setSyncStatus('ok', 'Sincronizado', t || '');
  }
}

startup();
</script>
